<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - WeatherAPI.com Integration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preload" as="image" href="./images/day.jpg">
    <link rel="preload" as="image" href="./images/night.jpg">
</head>

<body>
    <div class="background">
        <div class="container">

            <div class="header">
                <h1>🌍 Weather App India</h1>
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>

                <p>
                    Powered by WeatherAPI.com |
                    Accurate for all Indian cities
                </p>
            </div>

            <div class="search-section">

                <input type="text" id="cityInput" placeholder="Enter city name (e.g. Mumbai, Delhi, Jaipur)">

                <button class="weather-btn" id="getWeatherBtn">
                    Get Weather
                </button>

            </div>

            <div class="weather-result" id="weatherResult"></div>

            <div class="footer">
                <p>&copy; 2026 Weather App. All rights reserved.</p>
            </div>

        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
